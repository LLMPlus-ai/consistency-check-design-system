<style>
  html, body { margin: 0; background: var(--canvas); }
  @keyframes ccFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes ccSlide { from { transform: translateX(28px); } to { transform: translateX(0); } }
  @keyframes ccToast { from { opacity: 0; } to { opacity: 1; } }
  @keyframes ccPop { from { transform: scale(0.97); } to { transform: scale(1); } }
  @keyframes ccFadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes ccGrowX { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes ccPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  @keyframes ccStepPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(217,119,87,0.0); } 50% { box-shadow: 0 0 0 4px rgba(217,119,87,0.16); } }
  @keyframes ccSpin { to { transform: rotate(360deg); } }
  @keyframes ccDrawLine { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  @keyframes ccPt { from { opacity: 0; transform: scale(0.2); } to { opacity: 1; transform: scale(1); } }
  .cc-reveal { opacity: 0; animation: ccFadeUp 460ms cubic-bezier(0.22,0.61,0.36,1) forwards; }
  .cc-pt { transform-box: fill-box; transform-origin: center; animation: ccPt 420ms cubic-bezier(0.22,0.61,0.36,1) backwards; }
  @media (prefers-reduced-motion: reduce) { .cc-reveal, .cc-pt { animation: none; opacity: 1; } }
  @media print {
    @page { size: A4; margin: 14mm; }
    body * { visibility: hidden; }
    #cc-report, #cc-report * { visibility: visible; }
    #cc-report { position: absolute !important; inset: auto; left: 0; top: 0; width: 100%; overflow: visible !important; background: #fff !important; }
    .cc-report-toolbar { display: none !important; }
    .cc-report-page { box-shadow: none !important; margin: 0 auto !important; max-width: 100% !important; padding: 0 !important; }
  }
</style>
