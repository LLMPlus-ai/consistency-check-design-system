<!-- @dsCard group="Brand" viewport="700x150" name="Wordmark" subtitle="Bricolage display lockup with the verdict-dot mark" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--canvas); padding: 0; }
  .wrap { display: flex; height: 150px; }
  .light, .dark { flex: 1; display: flex; align-items: center; justify-content: center; gap: 12px; }
  .light { background: var(--canvas); }
  .dark { background: var(--surface-dark); }
  .mark { display: inline-flex; gap: 4px; align-items: center; }
  .d { width: 11px; height: 11px; border-radius: 50%; }
  .word { font: 600 26px/1 var(--font-display); letter-spacing: -0.6px; }
</style></head>
<body>
  <div class="wrap">
    <div class="light">
      <span class="mark"><span class="d" style="background: var(--verified)"></span><span class="d" style="background: var(--mischar)"></span><span class="d" style="background: var(--fabricated)"></span></span>
      <span class="word" style="color: var(--ink)">Consistency Check</span>
    </div>
    <div class="dark">
      <span class="mark"><span class="d" style="background: var(--verified)"></span><span class="d" style="background: var(--mischar)"></span><span class="d" style="background: var(--fabricated)"></span></span>
      <span class="word" style="color: var(--on-dark)">Consistency Check</span>
    </div>
  </div>
</body>
</html>
