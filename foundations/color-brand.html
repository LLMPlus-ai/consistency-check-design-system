<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--canvas); padding: 20px; display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 14px; border: 1px solid var(--hairline); min-height: 96px; display: flex; flex-direction: column; justify-content: space-between; }
  .name { font: var(--caption-strong); }
  .hex { font: var(--code-sm); opacity: 0.8; }
</style></head>
<body>
  <div class="sw" style="background: var(--primary); color: var(--on-primary); border-color: var(--primary);">
    <div class="name">Primary</div><div class="hex">#ea2804</div>
  </div>
  <div class="sw" style="background: var(--primary-deep); color: var(--on-primary); border-color: var(--primary-deep);">
    <div class="name">Primary deep · pressed</div><div class="hex">#c01f00</div>
  </div>
  <div class="sw" style="background: var(--primary-soft); color: var(--primary-deep);">
    <div class="name">Primary soft · tint</div><div class="hex">#fbe7e0</div>
  </div>
  <div class="sw" style="background: var(--hero-glow); color: var(--on-primary); border-color: var(--hero-glow);">
    <div class="name">Hero glow</div><div class="hex">#ff6a3d</div>
  </div>
</body>
</html>
