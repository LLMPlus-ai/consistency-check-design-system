<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--canvas); padding: 24px; color: var(--ink); }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--hairline); padding: 10px 0; }
  .meta { font: var(--code-sm); color: var(--ash); flex: 0 0 130px; }
  .spec { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
</style></head>
<body>
  <div class="line"><span class="meta">Display XL · 72</span><span class="spec cc-display-xl">Partner review</span></div>
  <div class="line"><span class="meta">Display LG · 48</span><span class="spec cc-display-lg">Consistency Check</span></div>
  <div class="line"><span class="meta">Display MD · 30</span><span class="spec cc-display-md">3 citations appear fabricated</span></div>
  <div class="line" style="border:none;"><span class="meta">Subtitle · 18</span><span class="spec" style="font: var(--subtitle);">Legal document verification for AI-assisted work</span></div>
</body>
</html>
