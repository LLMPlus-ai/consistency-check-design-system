<!-- @dsCard group="Type" viewport="700x180" name="Mono · citations" subtitle="JetBrains Mono — every case slug & reference reads as data" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--canvas); padding: 24px; }
  .well { background: var(--surface-dark); border-radius: var(--radius-md); padding: 18px 20px; color: var(--on-dark); }
  .c { font: var(--code-md); padding: 3px 0; }
  .c .ok { color: #6ee7a8; } .c .bad { color: #ff9b86; } .c .warn { color: #f0c674; }
  .meta { font: var(--overline); text-transform: uppercase; letter-spacing: 0.12em; color: var(--on-dark-mute); margin-bottom: 12px; }
</style></head>
<body>
  <div class="well">
    <div class="meta">Citation corpus · mono</div>
    <div class="c"><span class="ok">✓</span> Lumley v Gye (1853) 2 E &amp; B 216</div>
    <div class="c"><span class="ok">✓</span> Hadley v Baxendale (1854) 9 Ex 341</div>
    <div class="c"><span class="warn">~</span> Anglia Television Ltd v Reed [1972] 1 QB 60</div>
    <div class="c"><span class="bad">✕</span> Fairfax International Logistics v Brennan Holdings [2019] EWHC 1847 (Comm)</div>
  </div>
</body>
</html>
