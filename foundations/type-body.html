<!-- @dsCard group="Type" viewport="700x240" name="Headings & body" subtitle="Geist — all UI, labels, and prose" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--canvas); padding: 24px; color: var(--ink); }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--hairline); padding: 9px 0; }
  .meta { font: var(--code-sm); color: var(--ash); flex: 0 0 130px; }
</style></head>
<body>
  <div class="line"><span class="meta">Heading MD · 24</span><span style="font: var(--heading-md);">Citation findings</span></div>
  <div class="line"><span class="meta">Heading SM · 20</span><span style="font: var(--heading-sm);">Supervisor review queue</span></div>
  <div class="line"><span class="meta">Body LG · 18</span><span style="font: var(--body-lg); color: var(--body);">The document contains 12 legal authorities.</span></div>
  <div class="line"><span class="meta">Body MD · 16</span><span style="font: var(--body-md); color: var(--body);">3 appear fabricated, 2 mischaracterised, 7 verified.</span></div>
  <div class="line"><span class="meta">Body SM · 14</span><span style="font: var(--body-sm); color: var(--charcoal);">Extracted from skeleton argument</span></div>
  <div class="line" style="border:none;"><span class="meta">Overline · 11</span><span style="font: var(--overline); text-transform: uppercase; letter-spacing: 0.12em; color: var(--mute);">Recommended action</span></div>
</body>
</html>
