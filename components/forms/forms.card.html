<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--canvas); padding: 24px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
  .lbl { font: var(--overline); text-transform: uppercase; letter-spacing: 0.1em; color: var(--mute); width: 100%; margin-bottom: 2px; }
  .grp { margin-bottom: 22px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="text/babel">
  const { Button, IconButton, Input, FilterChip, Tabs } = window.ConsistencyCheckDesignSystem_77c3a7;
  const I = ({ n, s = 16 }) => {
    const ref = React.useRef(null);
    React.useEffect(() => {
      if (ref.current) ref.current.innerHTML = window.lucide.icons[n] ? '' : '';
      if (ref.current) { ref.current.innerHTML = ''; const el = document.createElement('i'); el.setAttribute('data-lucide', n); ref.current.appendChild(el); window.lucide.createIcons({ attrs: { width: s, height: s, 'stroke-width': 1.75 } }); }
    });
    return <span ref={ref} style={{ display: 'inline-flex' }} />;
  };
  function Demo() {
    const [tab, setTab] = React.useState('Findings');
    return (
      <div>
        <div className="grp">
          <div className="lbl">Buttons</div>
          <div className="row">
            <Button variant="primary">Escalate to Partner</Button>
            <Button variant="dark">Approve</Button>
            <Button variant="outline">View document</Button>
            <Button variant="ghost">Dismiss</Button>
            <Button variant="danger" size="sm">Remove citation</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
        </div>
        <div className="grp">
          <div className="lbl">Icon buttons · Filter chips</div>
          <div className="row">
            <IconButton ariaLabel="copy"><I n="copy" /></IconButton>
            <IconButton ariaLabel="menu"><I n="more-horizontal" /></IconButton>
            <IconButton variant="dark" ariaLabel="download"><I n="download" /></IconButton>
            <span style={{ width: 8 }} />
            <FilterChip active count={12}>All</FilterChip>
            <FilterChip dotColor="var(--verified)" count={7}>Verified</FilterChip>
            <FilterChip dotColor="var(--mischar)" count={2}>Mischaracterised</FilterChip>
            <FilterChip dotColor="var(--fabricated)" count={3}>Fabricated</FilterChip>
          </div>
        </div>
        <div className="grp">
          <div className="lbl">Input · Tabs</div>
          <div className="row" style={{ alignItems: 'stretch' }}>
            <div style={{ width: 280 }}>
              <Input placeholder="Search citations…" iconLeft={<I n="search" s={16} />} />
            </div>
          </div>
          <div style={{ marginTop: 12, maxWidth: 460 }}>
            <Tabs value={tab} onChange={setTab} tabs={['Findings', 'Evidence', 'History']} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
