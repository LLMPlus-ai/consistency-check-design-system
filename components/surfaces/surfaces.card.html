<!-- @dsCard group="Components" viewport="700x300" name="Surfaces & Data" subtitle="Cards, metric cards, reviewer avatars" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--canvas); padding: 24px; }
  .lbl { font: var(--overline); text-transform: uppercase; letter-spacing: 0.1em; color: var(--mute); margin-bottom: 8px; }
  .grp { margin-bottom: 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Card, StatCard, Avatar } = window.ConsistencyCheckDesignSystem_77c3a7;
  function Demo() {
    return (
      <div>
        <div className="grp" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
          <StatCard value="12" label="Total citations" caption="Extracted from skeleton argument" />
          <StatCard value="7" label="Verified" caption="Exists and applied correctly" accent="var(--verified)" />
          <StatCard value="3" label="Fabricated" caption="No reliable authority found" accent="var(--fabricated)" />
        </div>
        <div style={{ display: 'flex', gap: 12, alignItems: 'stretch' }}>
          <Card style={{ flex: 1 }}>
            <div className="lbl">White card</div>
            <div style={{ font: 'var(--body-sm)', color: 'var(--body)' }}>Hairline seat on cream. The default container for findings and panels.</div>
          </Card>
          <Card tone="bone" style={{ flex: 1 }}>
            <div className="lbl">Bone inset</div>
            <div style={{ font: 'var(--body-sm)', color: 'var(--body)' }}>Half-step deeper cream for grouped content.</div>
          </Card>
          <Card tone="dark" style={{ flex: 1 }}>
            <div style={{ font: 'var(--overline)', textTransform: 'uppercase', letterSpacing: '0.1em', color: 'var(--on-dark-mute)', marginBottom: 8 }}>Dark well</div>
            <div style={{ font: 'var(--code-sm)', color: 'var(--on-dark)' }}>Lumley v Gye (1853) 2 E &amp; B 216</div>
          </Card>
        </div>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginTop: 18 }}>
          <Avatar name="Partner Review" tone="dark" />
          <Avatar name="Senior Associate" />
          <Avatar name="Citation Verifier" tone="primary" />
          <span style={{ font: 'var(--body-sm)', color: 'var(--charcoal)' }}>Reviewer avatars — partner · associate · engine</span>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
